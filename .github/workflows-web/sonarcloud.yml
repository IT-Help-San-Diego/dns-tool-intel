name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Run tests with coverage
        run: |
          go test ./go-server/... \
            -skip 'DiscoverSubdomainsWithBudget|NoIntelInPublicRepo|NoIntelLeakage|NoIntelStagingDirectory|BoundaryIntegrity_FullRepoScan|IsOriginVisible|EdgeCDNMapsEmpty|GoldenRuleStubBoundary|ScrutinyClassificationAllFiles' \
            -coverprofile=coverage.out -covermode=atomic -count=1 -short -timeout 300s -parallel=2
        env:
          CGO_ENABLED: '0'
          GOGC: '50'
          GOMEMLIMIT: '6000MiB'

      - name: Verify coverage file
        run: |
          if [ ! -s coverage.out ]; then
            echo "::error::coverage.out is empty or missing"
            exit 1
          fi
          echo "=== Coverage summary ==="
          go tool cover -func=coverage.out | grep "^total:" || true

      - name: SonarCloud Scan
        uses: sonarsource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

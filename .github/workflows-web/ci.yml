name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Build OSS binary
        run: |
          cd go-server
          CGO_ENABLED=0 go build -ldflags "-s -w" -o ../dns-tool-server ./cmd/server
        env:
          CGO_ENABLED: '0'

      - name: Verify binary
        run: |
          ls -lh dns-tool-server
          file dns-tool-server

      - name: Vet
        run: go vet ./go-server/...
        env:
          CGO_ENABLED: '0'

      - name: Test
        run: |
          go test -short ./go-server/... -count=1 -timeout 300s -parallel=2 \
            -skip 'DiscoverSubdomainsWithBudget|NoIntelInPublicRepo|NoIntelLeakage|NoIntelStagingDirectory|BoundaryIntegrity_FullRepoScan|IsOriginVisible|EdgeCDNMapsEmpty|GoldenRuleStubBoundary|ScrutinyClassificationAllFiles'
        env:
          CGO_ENABLED: '0'
          GOGC: '50'
          GOMEMLIMIT: '6000MiB'

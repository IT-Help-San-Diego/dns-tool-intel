name: CI — Build & Test

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Detect build capability
        id: role
        run: |
          INTEL_COUNT=$(find go-server -name '*_intel.go' -not -path '*/vendor/*' 2>/dev/null | wc -l)
          if [ "$INTEL_COUNT" -gt 0 ]; then
            echo "is_intel=true" >> "$GITHUB_OUTPUT"
            echo "Detected $INTEL_COUNT _intel.go files — full product build"
          else
            echo "is_intel=false" >> "$GITHUB_OUTPUT"
            echo "No _intel.go files found — OSS-only build"
          fi

      - name: Build binary
        if: steps.role.outputs.is_intel == 'true'
        run: |
          cd go-server
          CGO_ENABLED=0 go build -tags intel -ldflags "-s -w" -o ../dns-tool-server ./cmd/server

      - name: Run tests
        if: steps.role.outputs.is_intel == 'true'
        run: |
          go test ./go-server/... -tags intel \
            -skip 'NoIntelInPublicRepo|NoIntelLeakage|NoIntelStagingDirectory|BoundaryIntegrity_FullRepoScan|IsOriginVisible|EdgeCDNMapsEmpty|GoldenRuleStubBoundary|ScrutinyClassificationAllFiles' \
            -count=1 -short -timeout 300s -parallel=2
        env:
          CGO_ENABLED: '0'
          GOGC: '50'
          GOMEMLIMIT: '6000MiB'

      - name: Build and vet (OSS fallback)
        if: steps.role.outputs.is_intel == 'false'
        run: |
          cd go-server
          CGO_ENABLED=0 go build -ldflags "-s -w" -o ../dns-tool-server ./cmd/server
          go vet ./...
          echo "OSS build — intel modules not present. Build and vet passed."
        env:
          CGO_ENABLED: '0'

      - name: Verify binary
        run: |
          ls -lh dns-tool-server
          file dns-tool-server

name: Mirror to dns-tool-web (OSS)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  mirror:
    name: Sync filtered mirror
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Filter and push to dns-tool-web
        env:
          WEB_REPO_TOKEN: ${{ secrets.GH_SYNC_TOKEN }}
        run: |
          set -euo pipefail

          WEB_REPO="IT-Help-San-Diego/dns-tool-web"
          CLONE_DIR="/tmp/web-mirror"

          git clone --depth 1 --single-branch --branch main \
            "https://x-access-token:${WEB_REPO_TOKEN}@github.com/${WEB_REPO}.git" \
            "$CLONE_DIR"

          find "$CLONE_DIR" -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

          rsync -a --exclude='.git' \
            --exclude='/providers/' \
            --exclude='/ai_surface/' \
            --exclude='/stubs/' \
            --exclude='/commands/' \
            --exclude='/golden_rules/' \
            --exclude='/remediation/' \
            --exclude='/scoring/' \
            --exclude='.local/' \
            --exclude='.agents/' \
            --exclude='attached_assets/' \
            --exclude='node_modules/' \
            --exclude='.cache/' \
            --exclude='.config/' \
            --exclude='.upm/' \
            --exclude='__pycache__/' \
            --exclude='.pythonlibs/' \
            --exclude='premium_templates/' \
            --exclude='premium_docs/' \
            --exclude='generated/' \
            --exclude='.generated/' \
            --exclude='.replit-artifact/' \
            --exclude='artifacts/' \
            --exclude='.github/workflows/' \
            --exclude='logs/' \
            --exclude='.replit' \
            --exclude='replit.nix' \
            --exclude='replit_agent.toml' \
            --exclude='dns-tool-server' \
            --exclude='Makefile.proprietary' \
            --exclude='.env' \
            --exclude='main.py' \
            --exclude='models.py' \
            --exclude='app.py' \
            --exclude='PROPRIETARY.md' \
            --exclude='.breakpoints' \
            --exclude='.gitattributes' \
            --exclude='.cursorignore' \
            --exclude='.cursorindexingignore' \
            --exclude='.cursorrules' \
            ./ "$CLONE_DIR/"

          find "$CLONE_DIR" -name '*.go' -print0 | while IFS= read -r -d '' f; do
            if head -5 "$f" | grep -q '//go:build.*intel' && ! head -5 "$f" | grep -q '!intel'; then
              rm -f "$f"
            fi
          done

          if [ -d ".github/workflows-web" ]; then
            mkdir -p "$CLONE_DIR/.github/workflows"
            cp .github/workflows-web/* "$CLONE_DIR/.github/workflows/"
          fi

          if [ -f "$CLONE_DIR/sonar-project.properties" ]; then
            python3 - "$CLONE_DIR/sonar-project.properties" << 'SONAR_FIX'
import sys, re
path = sys.argv[1]
with open(path) as f:
    content = f.read()
content = content.replace('sonar.projectKey=dns-tool-full', 'sonar.projectKey=dns-tool-web')
content = re.sub(r'sonar\.projectName=.*', 'sonar.projectName=DNS Tool \xb7 Public Mirror (dns-tool-web)', content)
intel_patterns = ['_intel.go', 'go-server/cmd/probe/', 'go-server/internal/handlers/admin_probes']
lines = content.split('\n')
filtered = []
i = 0
while i < len(lines):
    line = lines[i]
    if re.match(r'^sonar\.issue\.ignore\.multicriteria\.\w+\.ruleKey=', line):
        resource_line = lines[i + 1] if i + 1 < len(lines) else ''
        if any(p in resource_line for p in intel_patterns):
            while len(filtered) > 0 and filtered[-1].startswith('#'):
                filtered.pop()
            i += 2
            while i < len(lines) and lines[i] == '':
                i += 1
            continue
    filtered.append(line)
    i += 1
content = '\n'.join(filtered)
mc = re.search(r'^sonar\.issue\.ignore\.multicriteria=(.*)', content, re.MULTILINE)
if mc:
    keys = [k for k in mc.group(1).split(',') if f'multicriteria.{k}.ruleKey=' in content]
    content = content.replace(mc.group(0), f'sonar.issue.ignore.multicriteria={",".join(keys)}')
content = re.sub(r'(sonar\.cpd\.exclusions=)(.*)',
    lambda m: m.group(1) + ','.join(p for p in m.group(2).split(',') if '_intel.go' not in p)
    if any(p for p in m.group(2).split(',') if '_intel.go' not in p) else '', content)
content = re.sub(r'sonar\.coverage\.exclusions=(.*)$',
    lambda m: 'sonar.coverage.exclusions=' + ','.join(p for p in m.group(1).split(',') if 'probe' not in p.lower()),
    content, flags=re.MULTILINE)
content = re.sub(r'\n{3,}', '\n\n', content)
with open(path, 'w') as f:
    f.write(content)
SONAR_FIX
          fi

          cd "$CLONE_DIR"
          git config user.email "research@it-help.tech"
          git config user.name "IT Help San Diego"
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to sync."
            exit 0
          fi

          CHANGE_COUNT=$(git diff --cached --numstat | wc -l)
          VERSION=$(grep 'Version.*=' go-server/internal/config/config.go 2>/dev/null | head -1 | sed 's/.*"\(.*\)".*/\1/' || echo "unknown")
          COMMIT_MSG=$(git -C "$GITHUB_WORKSPACE" log -1 --format='%s')

          BRANCH="sync/v${VERSION}"
          git commit -m "v${VERSION}: ${COMMIT_MSG}" -m "${CHANGE_COUNT} files synced (proprietary excluded)"
          git push origin "HEAD:${BRANCH}" --force

          PR_RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer ${WEB_REPO_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${WEB_REPO}/pulls" \
            -d "{\"title\":\"v${VERSION}: ${COMMIT_MSG}\",\"head\":\"${BRANCH}\",\"base\":\"main\",\"body\":\"${CHANGE_COUNT} files synced. Proprietary excluded.\"}")

          PR_NUM=$(echo "$PR_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('number',''))")

          if [ -n "$PR_NUM" ]; then
            sleep 2
            curl -s -X PUT \
              -H "Authorization: Bearer ${WEB_REPO_TOKEN}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${WEB_REPO}/pulls/${PR_NUM}/merge" \
              -d "{\"merge_method\":\"squash\",\"commit_title\":\"v${VERSION}: ${COMMIT_MSG}\"}"

            curl -s -X DELETE \
              -H "Authorization: Bearer ${WEB_REPO_TOKEN}" \
              "https://api.github.com/repos/${WEB_REPO}/git/refs/heads/${BRANCH}" || true

            echo "PR #${PR_NUM} merged successfully."
          fi

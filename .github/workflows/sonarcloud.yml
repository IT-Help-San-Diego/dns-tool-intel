name: SonarCloud Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.23'

      - name: Run tests with coverage
        run: |
          cd go-server 2>/dev/null || true
          go test ./... -coverprofile=../coverage.out -covermode=atomic -json > ../test-report.json 2>&1 || true
          if [ -f ../coverage.out ]; then
            mv ../coverage.out ./coverage.out 2>/dev/null || true
            mv ../test-report.json ./test-report.json 2>/dev/null || true
          fi

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

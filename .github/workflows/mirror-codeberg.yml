name: Mirror to Codeberg

on:
  push:
    branches: ['**']
    tags: ['**']
  delete:

jobs:
  mirror:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Mirror to Codeberg (dns-tool-intel)
        env:
          CODEBERG_TOKEN: ${{ secrets.CODEBERG_TOKEN }}
        run: |
          git remote add codeberg-intel "https://careybalboa:${CODEBERG_TOKEN}@codeberg.org/careybalboa/dns-tool-intel.git"
          git push --force --all codeberg-intel
          git push --force --tags codeberg-intel

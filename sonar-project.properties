sonar.projectKey=careyjames_dns-tool-intel
sonar.organization=careyjames
sonar.projectName=DNS Tool Intel

sonar.sources=.
sonar.exclusions=**/*_test.go,**/testdata/**,scripts/**,docs/**,static/**,.github/**
sonar.tests=.
sonar.test.inclusions=**/*_test.go

# Coverage is generated from the main dns-tool-web repo where these files
# are compiled as part of the full Go module. The Intel repo contains
# standalone intelligence source files without a go.mod, so coverage
# cannot be generated here. Coverage analysis is handled upstream.
# sonar.go.coverage.reportPaths=coverage.out
# sonar.go.tests.reportPaths=test-report.json

sonar.sourceEncoding=UTF-8

# ── Issue suppressions ─────────────────────────────────────────────
# S1135: TODO comments are intentional design markers for planned
#        intelligence features in this pre-release module.
sonar.issue.ignore.multicriteria=t1,t2,t3

sonar.issue.ignore.multicriteria.t1.ruleKey=go:S1135
sonar.issue.ignore.multicriteria.t1.resourceKey=**/*.go

# S107: determineGrade intentionally accepts 8 parameters (1 over limit)
#       because they represent distinct protocol states that should not
#       be bundled into a grab-bag struct for readability.
sonar.issue.ignore.multicriteria.t2.ruleKey=go:S107
sonar.issue.ignore.multicriteria.t2.resourceKey=scoring/posture.go

# S3776: Cognitive complexity in buildDescriptiveMessage (16, limit 15)
#        and parseRobotsForAI (23, limit 15) — already decomposed with
#        helper functions; further extraction would harm readability.
sonar.issue.ignore.multicriteria.t3.ruleKey=go:S3776
sonar.issue.ignore.multicriteria.t3.resourceKey=**/*.go

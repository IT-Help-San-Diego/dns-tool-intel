# ── Global Exclusions ──────────────────────────────────────────────────
# Patterns are relative to the project base directory.
# Only items within sonar.sources (go-server) are scanned; top-level
# directories outside go-server are listed defensively in case sources
# is ever broadened.
#
# **/*_test.go             – Go test files (excluded from all analysis).
# **/vendor/**             – vendored third-party dependencies.
# go-server/db/schema/**   – generated SQL schema (output of sqlc).
# go-server/internal/dbq/** – generated Go query layer (output of sqlc).
# go-server/db/migrations/** – DDL migration scripts executed by goose;
#                              authored SQL, but SonarCloud's SQL analyser
#                              is not enabled for this project.
# go-server/db/queries/**  – sqlc query definitions compiled into Go;
#                              not executed directly at runtime.
# go-server/scripts/**     – one-off helper scripts (Python audit tool).
# AD0639176-snapshot.html  – frozen third-party U.S. government document
#                            snapshot (DTIC defense research citation page,
#                            saved via SingleFile). Eliminates 4 false-
#                            positive bugs and ~25 code smells.
sonar.exclusions=\
  **/*_test.go,\
  **/vendor/**,\
  go-server/db/schema/**,\
  go-server/internal/dbq/**,\
  go-server/db/migrations/**,\
  go-server/db/queries/**,\
  go-server/scripts/**,\
  go-server/static/references/AD0639176-snapshot.html

# Test files are excluded from code analysis via sonar.exclusions but remain
# visible for security hotspot review via sonar.tests.
sonar.tests=go-server
sonar.test.inclusions=**/*_test.go

sonar.go.coverage.reportPaths=coverage.out

# ── Coverage Exclusions ──────────────────────────────────────────────
# go-server/internal/dbq/**       – generated code (sqlc).
# go-server/cmd/server/main.go    – thin entrypoint; wiring only.
# go-server/templates/**          – HTML templates (not Go).
# go-server/tools/**              – offline build-time tooling.
# **/*.html, **/*.ts, **/*.js,
# **/*.css, **/*.json             – non-Go assets.
sonar.coverage.exclusions=\
  go-server/internal/dbq/**,\
  go-server/cmd/server/main.go,\
  go-server/templates/**,\
  go-server/tools/**,\
  **/*.html,\
  **/*.ts,\
  **/*.js,\
  **/*.css,\
  **/*.json

sonar.sourceEncoding=UTF-8

# ── Suppression Rules (multicriteria) ──────────────────────────────────
# Audit performed 2026-04-01 (architect-reviewed):
#   - Stale entry adminTlsSkipVerify removed (admin_probes.go uses
#     MinVersion TLS, not InsecureSkipVerify).
#   - Blanket **/*.sql and **/*.py exclusions replaced with specific paths.
#   - go-server/cmd/probe/** removed from coverage exclusions (security-
#     critical code must have coverage tracked).
#   - Redundant exclusions outside sonar.sources removed.
#   - All remaining suppressions cross-referenced with
#     security/security-intents.yaml SECINTENT registry.
#   - Next audit due: 2026-10-01 (6-month cycle).
sonar.issue.ignore.multicriteria=tlsSkipVerify,tlsHostname,bsCollapseA11y,dnsResolverIPs,analyzerIPs,icaeTestIPs,icuaeIPs,loopbackIPs,jsRandom,cssDarkThemeContrast,cssDarkThemeContrastTpl,postureParams,orchestratorParams,snapshotParams,ttlTunerParams,nsDelegationParams,ipInvestigationParams,icuaeProfileParams,probeTlsSkipVerify,probeTlsHostname,probeSSHHostCheck,adminSSHHostCheck,sigBgcolor,sigBgcolorPage,sigTable,sigTablePage,probeSSRF,probeCmd,printContrast,foundationContrast,videoSubtitles,videoSubtitlesForgotten,sigEmptyCatch,covertEmptyCatch,topoComplexity,topoArgOrder,topoNegation,varDeclProbe,varDeclAnalyzer,varDeclHandlers,varDeclTest,analysisAsyncParams,remediationComplexity,remediationTemplateContrast,remTablistRole,remTabRole,logHandlerCtx,agentDetachedCtx,intelStubTodos,testMockCreds1,testMockCreds2,testMockCreds3,testMockCreds4


            .topo-dur { fill: #8b949e; font-size: 9px; font-weight: 600; font-family: monospace; text-anchor: middle; opacity: 0; transition: opacity 0.3s; }

            .topo-connector { stroke: #21262d; stroke-width: 1.5; opacity: 0.4; transition: stroke 0.5s, opacity 0.5s; }
            .topo-connector.active { stroke: #4a8fe7; opacity: 0.7; stroke-dasharray: 6,3; animation: topo-flow 1s linear infinite; }
            .topo-connector.complete { stroke: #30363d; opacity: 0.6; stroke-dasharray: none; }
            @keyframes topo-flow { to { stroke-dashoffset: -9; } }

            .topo-res-line { stroke: #21262d; stroke-width: 0.8; opacity: 0.3; fill: none; transition: stroke 0.5s, opacity 0.5s; }

            .topo-res-label { fill: #484f58; font-size: 7px; font-weight: 600; font-family: system-ui, -apple-system, sans-serif; opacity: 0.5; transition: fill 0.5s, opacity 0.5s; }

            .topo-res-line.res-running { stroke-dasharray: 3,2; animation: topo-flow 1.2s linear infinite; opacity: 0.6; }
